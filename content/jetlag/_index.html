<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body style="font-size: 20px; text-align: center;">
    <header></header>
    <main>

<h1>CtB (WIP)</h1>

<style>
    .random-button {
        padding: 20px 40px;
        font-size: 1.5rem;
        background-color:rgb(115, 19, 199);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .random-button:hover {
        background-color: rgb(87, 14, 151);
    }
    .random-button:active {
        background-color: rgb(39, 6, 68);
    }
</style>

<button class="random-button" onclick="navigateToRandomNumberPage()">
    Random Challenge
</button>

<style>
    .poi-button {
        padding: 12px 20px;
        font-size: 1.5rem;
        background-color: rgb(174, 90, 202);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .poi-button:hover {
        background-color: rgb(124, 64, 144);
    }
    .poi-button:active {
        background-color: rgb(56, 28, 65);
    }
</style>

<br><br>

<button class="poi-button" onclick="navigateToRandompoi()">
    1 New POI
</button>

<script>
    function navigateToRandomNumberPage() {
        const max = 97;
        const min = 1;
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
        window.location.href = `/challenge/${randomNumber}`;
    }
</script>

<script>
    function navigateToRandompoi() {
        const max = 2;
        const min = 1;
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
        window.location.href = `/poi/${randomNumber}`;
    }
</script>

<br>
<!--<a href="/hideandseek/">For hide+seek click here</a>-->
</main>
    <footer><br></footer>
  </body>
  
</html>
