<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body style="font-size: 20px; text-align: center;">
    <header></header>
    <main>

<h1>Target Hunter</h1>

<style>
    .random-button {
        padding: 20px 40px;
        font-size: 1.5rem;
        background: linear-gradient(135deg, rgb(87, 14, 151), rgb(115, 19, 199));
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .random-button:hover {
        background: linear-gradient(135deg, rgb(87, 14, 151), rgb(115, 19, 199));
    }
    .random-button:active {
        background: linear-gradient(135deg, rgb(39, 6, 68), rgb(87, 14, 151));
    }
</style>

<button class="random-button" onclick="navigateToRandomNumberPage()">
    Random Challenge
</button>

<style>
    .target-button {
        padding: 20px 40px;
        font-size: 1.5rem;
        background: linear-gradient(135deg, rgb(190, 81, 9), rgb(197, 108, 31));
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .target-button:hover {
        background: linear-gradient(135deg, rgb(190, 81, 9), rgb(197, 108, 31));
    }
    .target-button:active {
        background: linear-gradient(135deg, rgb(154, 66, 7), rgb(152, 84, 24));
    }
</style>

<br><br>

<button class="target-button" onclick="navigateToRandomtarget()">
    1 New Target
</button>

<script>
    function navigateToRandomNumberPage() {
        const max = 97;
        const min = 1;
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
        window.location.href = `/challenge/${randomNumber}`;
    }
</script>

<script>
    function navigateToRandomtarget() {
        const max = 2;
        const min = 1;
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
        window.location.href = `/target/${randomNumber}`;
    }
</script>

<br>
<!--<a href="/hideandseek/">For hide+seek click here</a>-->
</main>
    <footer><br></footer>
  </body>
  
</html>
